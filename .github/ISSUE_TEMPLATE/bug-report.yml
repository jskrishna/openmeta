name: Bug report
description: Something is not working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OpenMeta. Please fill out as much as you can.
        Security issues → use private reporting (see SECURITY.md), not this form.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the bug.
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps someone else can follow.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions and setup that matter.
      value: |
        - OpenMeta:
        - WordPress:
        - PHP:
        - Node (if relevant):
        - OS:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Stack traces, console output, or screenshots (optional).
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: This is not a security vulnerability (those go to SECURITY.md)
          required: true
