name: Static analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: static-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
      - name: Placeholder
        run: |
          echo "PHPStan will run here once packages and phpstan.neon exist."

  types:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Placeholder
        run: |
          echo "tsc --noEmit will run here once TS packages exist."
