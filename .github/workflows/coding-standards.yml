name: Coding standards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: coding-standards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpcs:
    name: PHP coding standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: cs2pr
          coverage: none
      - name: Placeholder
        run: |
          echo "PHPCS / WordPress-Coding-Standards will run here once packages exist."

  eslint:
    name: JS coding standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Placeholder
        run: |
          echo "ESLint / Prettier will run here once packages exist."
