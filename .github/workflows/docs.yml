name: Docs

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
      - uses: ramsey/composer-install@v3

      - name: Generate API docs + search index + sitemap
        run: php bin/openmeta docs:build

      - name: Validate documentation (links, markdown)
        # Non-blocking while legacy docs links are cleaned up; ratchet to
        # required once `docs:validate` is clean.
        continue-on-error: true
        run: php bin/openmeta docs:validate

      - name: Upload generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: |
            docs/reference/api
            docs/assets
